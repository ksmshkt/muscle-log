<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-visual" />
  <title>muscle-log</title>
  <meta name="description" content="シンプルな筋トレ記録アプリ" />
  <meta name="theme-color" content="#3ea8ff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="muscle-log" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Auth Screen ── -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">muscle-log</div>

      <div class="auth-mode-tabs">
        <button class="auth-mode-tab active" data-mode="signin">Sign In</button>
        <button class="auth-mode-tab" data-mode="signup">Sign Up</button>
      </div>

      <form id="auth-form" novalidate>
        <div class="form-group">
          <label for="auth-email">Email</label>
          <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="auth-password">Password</label>
          <input type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <p id="auth-error" class="auth-error hidden"></p>
        <button type="submit" class="btn btn-primary" id="auth-submit">Sign In</button>
      </form>

    </div>
  </div>

  <!-- ── Main App ── -->
  <div id="app" class="hidden">
    <header>
      <span class="app-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="10" width="3" height="4" rx="1"/>
          <rect x="19" y="10" width="3" height="4" rx="1"/>
          <rect x="5" y="11.5" width="3" height="1" rx="0.5"/>
          <rect x="16" y="11.5" width="3" height="1" rx="0.5"/>
          <rect x="8" y="8" width="8" height="8" rx="1"/>
        </svg>
        muscle-log
      </span>
      <button class="btn-signout" id="btn-signout">Sign Out</button>
    </header>

    <nav>
      <button class="active" data-tab="log">Log</button>
      <button data-tab="charts">Charts</button>
    </nav>

    <main>
      <div id="page-log" class="page active">
        <input type="date" id="log-date" style="display:none" />
        <div class="log-calendar-section">
          <div class="calendar-nav">
            <button class="cal-nav-btn" id="cal-prev">‹</button>
            <span id="cal-month-label"></span>
            <button class="cal-nav-btn" id="cal-next">›</button>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
      </div>

      <div id="page-charts" class="page">
        <div class="period-tabs">
          <button class="period-tab active" data-period="month">Month</button>
          <button class="period-tab" data-period="year">Year</button>
          <button class="period-tab" data-period="all">All</button>
        </div>

        <div class="card">
          <div class="card-title-row">
            <h2>Body Weight</h2>
            <div class="stat-chip">
              <span class="stat-chip-value" id="stat-avg-bw">—</span>
              <span class="stat-chip-label" id="stat-avg-bw-label">Avg</span>
            </div>
          </div>
          <div class="chart-wrap" id="bw-chart-wrap">
            <canvas id="bw-chart"></canvas>
          </div>
          <p id="bw-placeholder" class="placeholder hidden">No data yet.</p>
        </div>

        <div class="card">
          <div class="card-title-row">
            <h2>Exercise Progress</h2>
            <div class="stat-chip">
              <span class="stat-chip-value" id="stat-sessions">—</span>
              <span class="stat-chip-label">Sessions</span>
            </div>
          </div>
          <div class="ex-controls-row">
            <div class="ex-select-wrap" id="exercise-select-wrap">
              <button class="ex-select-trigger" id="exercise-select-trigger">
                <span class="ex-select-label" id="exercise-select-label">— Select —</span>
                <span class="ex-select-caret">▾</span>
              </button>
              <ul class="ex-select-list hidden" id="exercise-select-list"></ul>
            </div>
            <div class="stat-chip">
              <span class="stat-chip-value" id="stat-max-weight">—</span>
              <span class="stat-chip-label">Max</span>
            </div>
          </div>
          <div class="ex-chart-area">
            <div class="chart-wrap hidden" id="ex-chart-wrap">
              <canvas id="ex-chart"></canvas>
            </div>
            <p id="ex-placeholder" class="placeholder">Select an exercise above.</p>
          </div>
        </div>

        <div class="card">
          <h2>Workout Frequency</h2>
          <div class="chart-wrap" id="freq-chart-wrap">
            <canvas id="freq-chart"></canvas>
          </div>
          <p id="freq-placeholder" class="placeholder hidden">No data yet.</p>
        </div>
      </div>

    </main>

    <!-- ── Log detail modal ── -->
    <div id="modal-log" class="modal hidden">
      <div class="modal-overlay" id="modal-log-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <button class="modal-date-nav" id="modal-date-prev">‹</button>
          <span id="modal-log-date"></span>
          <button class="modal-date-nav" id="modal-date-next">›</button>
          <button class="modal-close" id="modal-log-close">✕</button>
        </div>
        <div class="modal-log-top">
          <div class="unit-toggle">
            <button class="unit-btn active" data-unit="kg">kg</button>
            <button class="unit-btn" data-unit="lbs">lbs</button>
          </div>
          <div class="modal-bw-center">
            <div class="log-bw-section">
              <label for="input-body-weight">Body Weight</label>
              <div class="bw-input-row">
                <input type="number" id="input-body-weight" placeholder="0.0" min="0" step="0.1" />
                <span id="body-weight-unit-label">kg</span>
              </div>
            </div>
          </div>
          <div class="modal-side-actions">
            <button class="btn btn-outline btn-side-sm" id="btn-copy-from-date">Copy</button>
            <div id="copy-date-row" class="copy-date-row hidden">
              <input type="date" id="copy-date-input" />
              <button class="copy-date-confirm" id="btn-confirm-copy">✓</button>
              <button class="copy-date-cancel" id="btn-cancel-copy">✕</button>
            </div>
            <button class="btn btn-danger btn-side-sm hidden" id="btn-delete-log">Delete</button>
          </div>
        </div>
        <div class="log-toolbar">
          <button class="btn-add-exercise" id="btn-add-exercise">+ Add</button>
          <button class="btn btn-primary" id="btn-save-exercise" disabled>Save</button>
        </div>
        <div id="exercise-blocks"></div>
      </div>
    </div>

    <!-- ── Exercise picker modal ── -->
    <div id="modal-exercise" class="modal hidden">
      <div class="modal-overlay" id="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <span>Select Exercise</span>
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="category-tabs" id="category-tabs"></div>
        <ul class="exercise-list" id="exercise-list"></ul>
        <div class="custom-exercise-section">
          <div class="custom-exercise-form">
            <input type="text" id="custom-exercise-input" placeholder="Custom exercise name" />
            <button class="btn btn-primary" id="btn-save-custom">Add</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>

</body>
</html>
